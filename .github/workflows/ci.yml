name: CI

on:
  push:
    branches: [main]
  pull_request:

# Mirrors the local blocking pre-commit gate (.githooks-pre-commit.sh) so nothing
# that bypassed the hook (--no-verify, a foreign clone) reaches main unchecked.
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --check
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo audit (RustSec)
        run: cargo audit
